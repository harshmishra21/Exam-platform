apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: exam-backend-monitor
  namespace: exam-platform
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: exam-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - exam-platform
