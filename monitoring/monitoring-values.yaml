# values.yaml for kube-prometheus-stack Helm chart
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install monitoring prometheus-community/kube-prometheus-stack -n monitoring --create-namespace -f monitoring-values.yaml

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

grafana:
  enabled: true
  adminPassword: "changeme-set-via-secret"   # override via --set or external secret, never commit real password
  service:
    type: ClusterIP
  defaultDashboardsEnabled: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'exam-platform'
          orgId: 1
          folder: 'Exam Platform'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/exam-platform
  dashboards:
    exam-platform:
      exam-backend-dashboard:
        file: dashboards/exam-backend-dashboard.json

alertmanager:
  enabled: true
